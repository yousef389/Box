<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>بحبك يا هدهدتي ❤️</h1>

  <div class="cards">

    <div class="card good">
      <h3>بوسة 💋</h3>
      <p id="goodCount">0</p>
      <button onclick="action(this)" data-type="good">إيداع</button>
    </div>

    <div class="card bad">
      <h3>عقاب 😈</h3>
      <p id="badCount">0</p>
      <button onclick="action(this)" data-type="bad">تنفيذ</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
